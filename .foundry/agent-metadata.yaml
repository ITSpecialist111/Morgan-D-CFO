schemaVersion: 1
agentName: morgan-digital-cfo-hosted
defaultEnvironment: northCentralHosted
environments:
  dev:
    projectEndpoint: ${FOUNDRY_PROJECT_ENDPOINT}
    agentName: morgan-digital-cfo
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY_NAME}
    imageRepository: morgan-digital-cfo
    protocols:
      - responses:v1
      - a2a:v1
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      applicationInsightsResourceId: ${APPLICATIONINSIGHTS_RESOURCE_ID}
      logAnalyticsWorkspaceId: ${LOG_ANALYTICS_WORKSPACE_ID}
      purviewAuditWorkspaceId: ${PURVIEW_AUDIT_WORKSPACE_ID}
      agent365AuditCorrelation: true
    purview:
      auditEnabled: ${PURVIEW_AUDIT_ENABLED}
      auditLogSources:
        - Microsoft 365 user/app activity from Agent 365 MCP tools
        - Entra ID sign-ins and service principal activity
        - Exchange/Teams/SharePoint actions executed through Graph/MCP
        - Morgan custom audit events exported through Application Insights/Log Analytics
    testCases:
      - name: morgan-p0-hosted-smoke
        priority: P0
        dataset: .foundry/datasets/morgan-digital-cfo-dev-test-v1.jsonl
        evaluators:
          - intent_resolution
          - task_adherence
          - coherence
          - hate_unfairness
          - self_harm
        thresholds:
          intent_resolution: 4
          task_adherence: 4
          coherence: 4
      - name: morgan-p0-corpgen-paper-match
        priority: P0
        dataset: .foundry/datasets/morgan-digital-cfo-dev-test-v1.jsonl
        evaluators:
          - intent_resolution
          - task_adherence
          - coherence
          - groundedness
        thresholds:
          intent_resolution: 4
          task_adherence: 4
          coherence: 4
          groundedness: 4
  productionAppService:
    deploymentType: app-service
    resourceGroup: rg-morgan-finance-agent
    appName: morganfinanceagent-webapp
    baseUrl: https://morganfinanceagent-webapp.azurewebsites.net
    healthEndpoint: https://morganfinanceagent-webapp.azurewebsites.net/api/health
    responsesHealthEndpoint: https://morganfinanceagent-webapp.azurewebsites.net/responses/health
    missionControl: https://morganfinanceagent-webapp.azurewebsites.net/mission-control
  flightdeckHostedCandidate:
    deploymentType: hosted
    projectEndpoint: https://ai-flightdeck.services.ai.azure.com/api/projects/flightdeck-project
    resourceGroup: rg-flightdeck
    foundryAccount: ai-flightdeck
    projectName: flightdeck-project
    agentName: morgan-digital-cfo-hosted
    azureContainerRegistry: crflightdeck.azurecr.io
    imageRepository: morgan-digital-cfo
    latestBuiltImage: crflightdeck.azurecr.io/morgan-digital-cfo:20260507180211
    latestBuiltImageDigest: sha256:78ee1d27c9111afa7201cc5d5cbc8d1d3ab24f85967e6e4dbfcf63fd1487558c
    modelDeployment: gpt-5
    realtimeModelDeployment: gpt-realtime-mini
    protocol: responses/1.0.0
    cpu: "1"
    memory: 2Gi
    dockerfile: Dockerfile
    hostedDefinitionTemplate: .deploy/morgan-foundry-hosted-agent-definition.json
    testCases:
      - id: morgan-hosted-p0-smoke
        priority: P0
        dataset: .foundry/datasets/morgan-digital-cfo-hosted-smoke-v1.jsonl
        evaluators:
          - intent_resolution
          - task_adherence
          - coherence
          - violence
          - self_harm
          - hate_unfairness
        thresholds:
          intent_resolution: 4
          task_adherence: 4
          coherence: 4
      - name: morgan-p0-enterprise-runtime
        priority: P0
        dataset: .foundry/datasets/morgan-digital-cfo-dev-test-v1.jsonl
        evaluators:
          - intent_resolution
          - task_adherence
          - coherence
          - groundedness
        thresholds:
          intent_resolution: 4
          task_adherence: 4
          coherence: 4
          groundedness: 4
    remainingBlockers:
      - Flightdeck is in uksouth, which is not currently supported for Foundry hosted agents preview.
      - Create or select a Foundry project in a supported hosted-agent region before agent_update can create Morgan.
      - Hosted-agent environment variables must be confirmed before including values in the Foundry payload.
      - The hosted container must be started and verified with agent_container_status_get before claiming production readiness.
