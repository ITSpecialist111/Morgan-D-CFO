name: Morgan Daily CFO Workday

# Reliable "runs every day" trigger for the Morgan Digital CFO showcase.
# The App Service runs on the Free (F1) tier, which idles out after ~20 min and
# cannot use "Always On", so the in-process scheduler alone is not dependable.
# This free GitHub-hosted cron wakes the app and force-runs Morgan's autonomous
# CFO workday once a day, which populates Mission Control with fresh work for demos.
#
# ── ONE-TIME SETUP (repo → Settings → Secrets and variables → Actions) ──
#   MORGAN_APP_URL          = https://morganfinanceagent-webapp.azurewebsites.net
#   MORGAN_SCHEDULED_SECRET = <the SCHEDULED_SECRET value configured on the App Service>
# No secrets are stored in this file; they are read from GitHub repo secrets at run time.

on:
  schedule:
    - cron: '0 8 * * *'   # every day at 08:00 UTC (adjust as needed)
  workflow_dispatch: {}    # allows a manual "Run workflow" from the Actions tab

jobs:
  run-workday:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Morgan (App Service warm-up)
        run: |
          if [ -z "${{ secrets.MORGAN_APP_URL }}" ]; then
            echo "MORGAN_APP_URL secret is not set; skipping. Add it under repo Actions secrets."
            exit 1
          fi
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.MORGAN_APP_URL }}/api/health" || true)
            echo "health attempt $i -> $code"
            if [ "$code" = "200" ]; then echo "Morgan is awake."; break; fi
            sleep 15
          done

      - name: Trigger autonomous CFO workday
        run: |
          curl -sS -X POST "${{ secrets.MORGAN_APP_URL }}/api/mission-control/run-workday" \
            -H "x-scheduled-secret: ${{ secrets.MORGAN_SCHEDULED_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"github-actions-daily"}' \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body
