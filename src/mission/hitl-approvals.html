<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morgan Digital CFO — Approvals</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #5c677d;
      --line: #d9e1ec;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --blue: #2563eb;
      --teal: #0f766e;
      --amber: #b45309;
      --red: #b42318;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.45 "Segoe UI", Arial, sans-serif; }
    header { background: var(--panel); border-bottom: 1px solid var(--line); padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 20px; font-weight: 650; }
    main { max-width: 1180px; margin: 0 auto; padding: 22px; display: grid; gap: 16px; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric, .approval { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
    .metric b { display: block; font-size: 22px; }
    .metric span, .muted { color: var(--muted); }
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .queue { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 14px; }
    .approval { display: grid; gap: 12px; border-left: 4px solid var(--amber); }
    .approval.decided { border-left-color: var(--teal); opacity: .84; }
    .title-row { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    h2 { margin: 0; font-size: 17px; }
    .pill { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; font-size: 12px; color: var(--muted); white-space: nowrap; }
    .pill.l2 { color: var(--amber); border-color: #f4c97b; background: #fff7e8; }
    .pill.l3 { color: var(--red); border-color: #f2a7a0; background: #fff1f0; }
    dl { margin: 0; display: grid; grid-template-columns: 88px 1fr; gap: 6px 10px; }
    dt { color: var(--muted); }
    dd { margin: 0; }
    .preview { border: 1px solid var(--line); border-radius: 6px; padding: 10px; background: #fbfdff; color: #29364d; min-height: 76px; }
    .evidence { display: flex; flex-wrap: wrap; gap: 6px; }
    .evidence span { border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; background: #fbfdff; font-size: 12px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    button, a.button { border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); padding: 8px 10px; font: inherit; cursor: pointer; text-decoration: none; }
    button.primary { background: var(--blue); color: white; border-color: var(--blue); }
    button.danger { color: var(--red); }
    button:disabled { cursor: not-allowed; opacity: .55; }
    textarea { width: 100%; min-height: 74px; resize: vertical; border: 1px solid var(--line); border-radius: 6px; padding: 9px; font: inherit; }
    .status { min-height: 22px; color: var(--muted); }
    .empty { background: var(--panel); border: 1px dashed var(--line); border-radius: 8px; padding: 24px; text-align: center; color: var(--muted); }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      main { padding: 14px; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Morgan Digital CFO — Approvals</h1>
      <div class="muted">L2 and L3 decisions waiting on CFO / Finance Approver action</div>
    </div>
    <a class="button" href="/mission-control#autonomousKanban">Mission Control</a>
  </header>
  <main>
    <section class="summary" aria-label="Approval summary">
      <div class="metric"><b id="pendingCount">0</b><span>pending</span></div>
      <div class="metric"><b id="approvedCount">0</b><span>approved</span></div>
      <div class="metric"><b id="l2Count">0</b><span>L2</span></div>
      <div class="metric"><b id="l3Count">0</b><span>L3</span></div>
    </section>
    <section class="toolbar">
      <div class="status" id="status">Loading approvals...</div>
      <button type="button" id="refreshButton">Refresh</button>
    </section>
    <section class="queue" id="approvalQueue" aria-live="polite"></section>
  </main>
  <script>
    const queue = document.getElementById('approvalQueue');
    const statusEl = document.getElementById('status');
    const refreshButton = document.getElementById('refreshButton');

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    }

    function countWhere(items, predicate) {
      return items.filter(predicate).length;
    }

    function setMetrics(items) {
      document.getElementById('pendingCount').textContent = countWhere(items, item => item.status === 'pending');
      document.getElementById('approvedCount').textContent = countWhere(items, item => item.status === 'approved' || item.status === 'approved_with_edits');
      document.getElementById('l2Count').textContent = countWhere(items, item => item.level === 'L2');
      document.getElementById('l3Count').textContent = countWhere(items, item => item.level === 'L3');
    }

    function renderApproval(item) {
      const disabled = item.status !== 'pending' ? 'disabled' : '';
      return `<article class="approval ${item.status === 'pending' ? '' : 'decided'}" id="${escapeHtml(item.id)}">
        <div class="title-row">
          <div>
            <h2>${escapeHtml(item.title)}</h2>
            <div class="muted">${escapeHtml(item.caseId)} - ${escapeHtml(item.customer)}</div>
          </div>
          <span class="pill ${String(item.level).toLowerCase()}">${escapeHtml(item.level)} ${escapeHtml(item.status)}</span>
        </div>
        <dl>
          <dt>Action</dt><dd>${escapeHtml(item.actionType)}</dd>
          <dt>Recipient</dt><dd>${escapeHtml(item.recipient)}</dd>
          <dt>Sponsor</dt><dd>${escapeHtml(item.sponsor)}</dd>
          <dt>Timeout</dt><dd>${new Date(item.timeoutAt).toLocaleString()}</dd>
        </dl>
        <div class="preview">${escapeHtml(item.bodyPreview)}</div>
        <div>${escapeHtml(item.rationale)}</div>
        <div class="evidence">${(item.evidence || []).map(value => `<span>${escapeHtml(value)}</span>`).join('')}</div>
        <textarea id="note-${escapeHtml(item.id)}" placeholder="Optional decision note or edited body" ${disabled}></textarea>
        <div class="actions">
          <button class="primary" type="button" ${disabled} data-id="${escapeHtml(item.id)}" data-decision="approve">Approve</button>
          <button type="button" ${disabled} data-id="${escapeHtml(item.id)}" data-decision="approve_with_edits">Approve With Edits</button>
          <button class="danger" type="button" ${disabled} data-id="${escapeHtml(item.id)}" data-decision="decline">Decline</button>
          <button type="button" ${disabled} data-id="${escapeHtml(item.id)}" data-decision="cancel">Cancel</button>
        </div>
      </article>`;
    }

    async function loadApprovals() {
      statusEl.textContent = 'Loading approvals...';
      const response = await fetch('/api/hitl/approvals', { headers: { 'Accept': 'application/json' } });
      if (response.status === 401) {
        const body = await response.json().catch(() => ({}));
        statusEl.innerHTML = `Sign in required. <a href="${escapeHtml(body.loginUrl || '/auth/login?returnTo=/approvals')}">Sign in</a>`;
        queue.innerHTML = '';
        return;
      }
      if (!response.ok) throw new Error(`Approval API returned ${response.status}`);
      const data = await response.json();
      const items = Array.isArray(data.requests) ? data.requests : [];
      setMetrics(items);
      queue.innerHTML = items.length ? items.map(renderApproval).join('') : '<div class="empty">No HITL approvals are waiting.</div>';
      statusEl.textContent = `${items.length} approval record(s) loaded.`;
      if (location.hash) {
        const target = document.getElementById(decodeURIComponent(location.hash.slice(1)));
        if (target) target.scrollIntoView({ block: 'start', behavior: 'smooth' });
      }
    }

    async function decide(id, decision) {
      const note = document.getElementById(`note-${id}`)?.value || '';
      statusEl.textContent = `Recording ${decision}...`;
      const response = await fetch(`/api/hitl/approvals/${encodeURIComponent(id)}/decision`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ decision, rationale: note, editedBody: decision === 'approve_with_edits' ? note : undefined }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok || !body.ok) throw new Error(body.error || `Decision API returned ${response.status}`);
      statusEl.textContent = `Recorded ${decision} for ${body.request.title}.`;
      await loadApprovals();
    }

    queue.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-id]');
      if (!button) return;
      decide(button.dataset.id, button.dataset.decision).catch(error => { statusEl.textContent = error.message; });
    });
    refreshButton.addEventListener('click', () => loadApprovals().catch(error => { statusEl.textContent = error.message; }));
    loadApprovals().catch(error => { statusEl.textContent = error.message; });
  </script>
</body>
</html>
